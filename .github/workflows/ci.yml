name: PartiuCorrer CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
          
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci || npm install
        
      - name: Run Backend Tests
        working-directory: ./backend
        run: npm test

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci || npm install
        
      - name: Build React App
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false # Ignore warnings as errors

  docker-build:
    name: Docker Build Sanity Check
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Backend Image
        run: docker build -t partiucorrer-backend ./backend
        
      - name: Build Frontend Image
        run: docker build -t partiucorrer-frontend ./frontend
